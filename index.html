<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B.Tech Roadmap Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/2.1.0/showdown.min.js"></script>
    <style>
        :root {
            --primary-color: #3b82f6;
            --secondary-color: #1e293b;
            --background-light: #f1f5f9;
            --background-dark: #0f172a;
            --text-light: #0f172a;
            --text-dark: #f1f5f9;
            --card-bg-light: #ffffff;
            --card-bg-dark: #1e293b;
            --border-light: #e2e8f0;
            --border-dark: #334155;
            --link-color-light: #2563eb;
            --link-color-dark: #60a5fa;
        }
        html.dark {
            --primary-color: #60a5fa;
            --secondary-color: #f1f5f9;
            --background-light: #0f172a;
            --background-dark: #0f172a;
            --text-light: #f1f5f9;
            --text-dark: #f1f5f9;
            --card-bg-light: #1e293b;
            --card-bg-dark: #1e293b;
            --border-light: #334155;
            --border-dark: #334155;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background-light);
            color: var(--text-light);
            transition: background-color 0.3s, color 0.3s;
        }
        .card {
            background-color: var(--card-bg-light);
            border: 1px solid var(--border-light);
        }
        .progress-bar-bg {
            background-color: var(--border-light);
        }
        .progress-bar-fill {
            background-color: var(--primary-color);
        }
        .dropdown, .search-input {
            background-color: var(--card-bg-light);
            border: 1px solid var(--border-light);
        }
        .lang-btn.active {
            background-color: var(--primary-color);
            color: white;
        }
        .resource-link {
            color: var(--link-color-light);
            text-decoration: none;
            font-weight: 500;
        }
        html.dark .resource-link {
            color: var(--link-color-dark);
        }
        .resource-link:hover {
            text-decoration: underline;
        }
        [data-collapsible-content] {
            transition: max-height 0.5s ease-in-out;
            overflow: hidden;
        }
        .gemini-btn {
            background-color: #8b5cf6;
            color: white;
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-left: 8px;
            transition: background-color 0.2s;
            display: inline-flex;
            align-items: center;
        }
        .gemini-btn:hover {
            background-color: #7c3aed;
        }
        #ai-modal-overlay {
            transition: opacity 0.3s ease-in-out;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #8b5cf6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-200">

    <!-- Main Container -->
    <div class="container mx-auto p-4 md:p-8">

        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-4xl md:text-5xl font-bold text-blue-500 dark:text-blue-400" data-lang-key="title">B.Tech Roadmap Hub</h1>
            <p class="mt-2 text-lg text-slate-600 dark:text-slate-400" data-lang-key="subtitle">Your AI-powered guide to a successful engineering career.</p>
        </header>

        <!-- Controls Section -->
        <div class="sticky top-0 z-10 bg-slate-100/80 dark:bg-slate-900/80 backdrop-blur-sm p-4 rounded-xl shadow-md mb-8">
            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4 items-center">
                <!-- Branch Filter -->
                <div class="md:col-span-1 lg:col-span-1">
                    <label for="branch-select" class="block text-sm font-medium mb-1" data-lang-key="filter_branch">Branch</label>
                    <select id="branch-select" class="w-full p-2.5 rounded-lg border bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                    </select>
                </div>

                <!-- Goal Filter -->
                <div class="md:col-span-1 lg:col-span-1">
                    <label for="goal-select" class="block text-sm font-medium mb-1" data-lang-key="filter_goal">Career Goal</label>
                    <select id="goal-select" class="w-full p-2.5 rounded-lg border bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                    </select>
                </div>
                
                <!-- Search Bar -->
                <div class="md:col-span-3 lg:col-span-2">
                     <label for="search-input" class="block text-sm font-medium mb-1" data-lang-key="search_label">Search Topics</label>
                    <input type="text" id="search-input" class="w-full p-2.5 rounded-lg border bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" placeholder="e.g., Python, GATE, React...">
                </div>

                <!-- Settings -->
                <div class="flex items-center justify-center md:justify-end space-x-2 md:col-span-3 lg:col-span-1 mt-4 lg:mt-0 self-end">
                    <!-- Language Selector -->
                    <div class="flex bg-slate-200 dark:bg-slate-700 rounded-lg p-1">
                        <button class="lang-btn px-3 py-1 text-sm rounded-md" data-lang="en">EN</button>
                        <button class="lang-btn px-3 py-1 text-sm rounded-md" data-lang="hi">HI</button>
                        <button class="lang-btn px-3 py-1 text-sm rounded-md" data-lang="te">TE</button>
                    </div>
                    <!-- Dark Mode Toggle -->
                    <button id="dark-mode-toggle" class="p-2.5 rounded-lg bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200">
                        <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.121-3.536a1 1 0 011.414 0l.707.707a1 1 0 01-1.414 1.414l-.707-.707a1 1 0 010-1.414zM10 16a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm-4.464-4.95l-.707-.707a1 1 0 00-1.414 1.414l.707.707a1 1 0 001.414-1.414zm-2.121 3.536a1 1 0 01-1.414 0l-.707-.707a1 1 0 011.414-1.414l.707.707a1 1 0 010 1.414zM2 10a1 1 0 011-1h1a1 1 0 110 2H3a1 1 0 01-1-1z" clip-rule="evenodd" /></svg>
                        <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" viewBox="0 0 20 20" fill="currentColor"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" /></svg>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Motivational Quote -->
        <div id="motivational-quote" class="my-6 p-4 bg-blue-100 dark:bg-blue-900/50 border-l-4 border-blue-500 rounded-r-lg text-slate-700 dark:text-blue-200 italic">
        </div>

        <!-- Roadmap Display Area -->
        <div id="roadmap-container" class="space-y-6">
        </div>
        
        <!-- No Roadmap Selected / No Results Message -->
        <div id="message-container" class="hidden text-center py-16">
            <h3 class="text-2xl font-semibold text-slate-700 dark:text-slate-300" data-lang-key="no_roadmap_title"></h3>
            <p class="text-slate-500 dark:text-slate-400 mt-2" data-lang-key="no_roadmap_desc"></p>
        </div>

    </div>

    <!-- AI Modal -->
    <div id="ai-modal-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 hidden">
        <div id="ai-modal" class="bg-white dark:bg-slate-800 rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center p-4 border-b border-slate-200 dark:border-slate-700">
                <h3 id="ai-modal-title" class="text-xl font-semibold text-slate-800 dark:text-slate-200">✨ AI Assistant</h3>
                <button id="ai-modal-close" class="text-slate-500 hover:text-slate-800 dark:hover:text-slate-200">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="ai-modal-content" class="p-6 overflow-y-auto">
                <!-- AI content will be injected here -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA ---
            const roadmapData = {};
            const translations = {};
            const quotes = {};

            // --- STATE ---
            let currentLang = 'en';
            let currentBranch = '';
            let currentGoal = '';
            let progress = {};
            const showdownConverter = new showdown.Converter();

            // --- DOM ELEMENTS ---
            const branchSelect = document.getElementById('branch-select');
            const goalSelect = document.getElementById('goal-select');
            const searchInput = document.getElementById('search-input');
            const roadmapContainer = document.getElementById('roadmap-container');
            const messageContainer = document.getElementById('message-container');
            const darkModeToggle = document.getElementById('dark-mode-toggle');
            const sunIcon = document.getElementById('sun-icon');
            const moonIcon = document.getElementById('moon-icon');
            const langButtons = document.querySelectorAll('.lang-btn');
            const quoteContainer = document.getElementById('motivational-quote');
            const aiModalOverlay = document.getElementById('ai-modal-overlay');
            const aiModal = document.getElementById('ai-modal');
            const aiModalTitle = document.getElementById('ai-modal-title');
            const aiModalContent = document.getElementById('ai-modal-content');
            const aiModalClose = document.getElementById('ai-modal-close');

            // --- INITIALIZATION ---
            function init() {
                loadData();
                loadDarkMode();
                loadLanguage();
                loadProgress();
                populateDropdowns();
                loadSavedRoadmap();
                updateUI();
                setupEventListeners();
                displayRandomQuote();
            }

            // --- DATA LOADING ---
            function loadData() {
                // Shared roadmaps
                const sdePath = { "name": { "en": "Software Development", "hi": "सॉफ्टवेयर डेवलपमेंट", "te": "సాఫ్ట్‌వేర్ డెవలప్‌మెంట్" }, "roadmap": [ { "title": { "en": "Year 1: Foundations", "hi": "वर्ष 1: नींव", "te": "సంవత్సరం 1: పునాదులు" }, "content": [ { "type": "subject", "text": { "en": "C Programming & Data Structures (Basics)", "hi": "सी प्रोग्रामिंग और डेटा संरचनाएं (मूल बातें)", "te": "సి ప్రోగ్రామింగ్ & డేటా స్ట్రక్చర్స్ (బేసిక్స్)" } }, { "type": "skill", "text": { "en": "Learn Git & GitHub for version control", "hi": "संस्करण नियंत्रण के लिए गिट और गिटहब सीखें", "te": "వెర్షన్ కంట్రోల్ కోసం గిట్ & గిట్‌హబ్ నేర్చుకోండి" } }, { "type": "resource", "text": { "en": { "title": "Neso Academy - C Programming Playlist", "url": "https://www.youtube.com/playlist?list=PLBlnK6fEyqRhX6r2uhhlubuF5QextdCSM" }, "hi": { "title": "नेसो अकादमी - सी प्रोग्रामिंग प्लेलिस्ट", "url": "https://www.youtube.com/playlist?list=PLBlnK6fEyqRhX6r2uhhlubuF5QextdCSM" }, "te": { "title": "నీసో అకాడమీ - సి ప్రోగ్రామింగ్ ప్లేలిస్ట్", "url": "https://www.youtube.com/playlist?list=PLBlnK6fEyqRhX6r2uhhlubuF5QextdCSM" } } } ] }, { "title": { "en": "Year 2: Core Skills", "hi": "वर्ष 2: मुख्य कौशल", "te": "సంవత్సరం 2: ప్రధాన నైపుణ్యాలు" }, "content": [ { "type": "subject", "text": { "en": "Object-Oriented Programming (Java/C++), Advanced DSA", "hi": "ऑब्जेक्ट-ओरिएंटेड प्रोग्रामिंग (जावा/सी++), उन्नत डीएसए", "te": "ఆబ్జెక్ట్-ఓరియెంటెడ్ ప్రోగ్రామింగ్ (జావా/సి++), అధునాతన డిఎస్‌ఎ" } }, { "type": "skill", "text": { "en": "Learn a frontend framework (e.g., React)", "hi": "एक फ्रंटएंड फ्रेमवर्क सीखें (उदा., रिएक्ट)", "te": "ఒక ఫ్రంటెండ్ ఫ్రేమ్‌వర్క్ నేర్చుకోండి (ఉదా., రియాక్ట్)" } }, { "type": "resource", "text": { "en": { "title": "Practice DSA on LeetCode", "url": "https://leetcode.com/problemset/" }, "hi": { "title": "लीटकोड पर डीएसए का अभ्यास करें", "url": "https://leetcode.com/problemset/" }, "te": { "title": "లీట్‌కోడ్‌లో డిఎస్‌ఎ ప్రాక్టీస్ చేయండి", "url": "https://leetcode.com/problemset/"                                         { "type": "goal", "text": { "en": "Apply for internships in chemical plants", "hi": "रासायनिक संयंत्रों में इंटर्नशिप के लिए आवेदन करें", "te": "రసాయన ప్లాంట్లలో ఇంటర్న్‌షిప్‌ల కోసం దరఖాస్తు చేసుకోండి" } }
                                    ]}
                                ]
                            }
                        }
                    }
                });
                
                Object.assign(translations, {
                    en: {
                        title: "B.Tech Roadmap Hub", subtitle: "Your AI-powered guide to a successful engineering career.",
                        filter_branch: "Branch", filter_goal: "Career Goal", search_label: "Search Topics",
                        no_roadmap_title: "Select a Roadmap", no_roadmap_desc: "Choose your branch and career goal to see your personalized path.",
                        select_goal_title: "Almost there!", select_goal_desc: "Now, please select your career goal to view the roadmap.",
                        no_results_title: "No Results Found", no_results_desc: "Try adjusting your search or filter criteria.",
                        progress: "Progress", resources: "Resources", subjects: "Subjects", skills: "Skills", projects: "Projects", goals: "Goals",
                    },
                    hi: {
                        title: "बी.टेक रोडमैप हब", subtitle: "एक सफल इंजीनियरिंग करियर के लिए आपका एआई-संचालित मार्गदर्शक।",
                        filter_branch: "शाखा", filter_goal: "कैरियर लक्ष्य", search_label: "विषय खोजें",
                        no_roadmap_title: "एक रोडमैप चुनें", no_roadmap_desc: "अपना व्यक्तिगत पथ देखने के लिए अपनी शाखा और कैरियर लक्ष्य चुनें।",
                        select_goal_title: "लगभग हो गया!", select_goal_desc: "अब, रोडमैप देखने के लिए कृपया अपना कैरियर लक्ष्य चुनें।",
                        no_results_title: "कोई परिणाम नहीं मिला", no_results_desc: "अपनी खोज या फ़िल्टर मानदंड समायोजित करने का प्रयास करें।",
                        progress: "प्रगति", resources: "संसाधन", subjects: "विषय", skills: "कौशल", projects: "परियोजनाएं", goals: "लक्ष्य",
                    },
                    te: {
                        title: "బి.టెక్ రోడ్‌మ్యాప్ హబ్", subtitle: "విజయవంతమైన ఇంజనీరింగ్ కెరీర్ కోసం మీ AI- శక్తితో కూడిన గైడ్.",
                        filter_branch: "బ్రాంచ్", filter_goal: "కెరీర్ లక్ష్యం", search_label: "అంశాలను శోధించండి",
                        no_roadmap_title: "ఒక రోడ్‌మ్యాప్‌ను ఎంచుకోండి", no_roadmap_desc: "మీ వ్యక్తిగత మార్గాన్ని చూడటానికి మీ బ్రాంచ్ మరియు కెరీర్ లక్ష్యాన్ని ఎంచుకోండి.",
                        select_goal_title: "దాదాపు పూర్తయింది!", select_goal_desc: "ఇప్పుడు, రోడ్‌మ్యాప్‌ను వీక్షించడానికి దయచేసి మీ కెరీర్ లక్ష్యాన్ని ఎంచుకోండి.",
                        no_results_title: "ఫలితాలు కనుగొనబడలేదు", no_results_desc: "మీ శోధన లేదా ఫిల్టర్ ప్రమాణాలను సర్దుబాటు చేయడానికి ప్రయత్నించండి.",
                        progress: "పురోగతి", resources: "వనరులు", subjects: "సబ్జెక్టులు", skills: "నైపుణ్యాలు", projects: "ప్రాజెక్ట్‌లు", goals: "లక్ష్యాలు",
                    }
                });
                
                Object.assign(quotes, {
                    en: [ "The best way to predict the future is to create it.", "Success is not final, failure is not fatal: it is the courage to continue that counts.", "Believe you can and you're halfway there." ],
                    hi: [ "भविष्य की भविष्यवाणी करने का सबसे अच्छा तरीका उसे बनाना है।", "सफलता अंतिम नहीं है, असफलता घातक नहीं है: यह जारी रखने का साहस है जो मायने रखता है।", "विश्वास करो कि तुम कर सकते हो और तुम आधे रास्ते पर हो।" ],
                    te: [ "భవిష్యత్తును అంచనా వేయడానికి ఉత్తమ మార్గం దానిని సృష్టించడం।", "విజయం అంతిమమైనది కాదు, వైఫల్యం ప్రాణాంతకం కాదు: కొనసాగించే ధైర్యమే ముఖ్యం।", "మీరు చేయగలరని నమ్మండి మరియు మీరు సగం దూరం చేరుకున్నట్లే।" ]
                });
            }


            // --- EVENT LISTENERS ---
            function setupEventListeners() {
                branchSelect.addEventListener('change', handleFilterChange);
                goalSelect.addEventListener('change', handleFilterChange);
                searchInput.addEventListener('input', () => renderRoadmap(currentBranch, currentGoal));
                darkModeToggle.addEventListener('click', toggleDarkMode);
                langButtons.forEach(button => {
                    button.addEventListener('click', () => setLanguage(button.dataset.lang));
                });
                roadmapContainer.addEventListener('change', handleProgressChange);
                roadmapContainer.addEventListener('click', (e) => {
                    handleCollapsibleClick(e);
                    handleGeminiClick(e);
                });
                aiModalClose.addEventListener('click', closeAiModal);
                aiModalOverlay.addEventListener('click', (e) => {
                    if (e.target === aiModalOverlay) {
                        closeAiModal();
                    }
                });
            }
            
            // --- UI RENDERING ---
            function populateDropdowns() {
                branchSelect.innerHTML = `<option value="">-- ${translations[currentLang]?.filter_branch || 'Branch'} --</option>`;
                for (const branchKey in roadmapData) {
                    const branch = roadmapData[branchKey];
                    if (branch && branch.name) {
                        const option = document.createElement('option');
                        option.value = branchKey;
                        option.textContent = branch.name[currentLang] || branch.name.en;
                        branchSelect.appendChild(option);
                    }
                }
                goalSelect.innerHTML = `<option value="">-- ${translations[currentLang]?.filter_goal || 'Career Goal'} --</option>`;
                goalSelect.disabled = true;
            }

            function updateGoalDropdown(branchKey) {
                if (branchKey && roadmapData[branchKey]) {
                    const goals = roadmapData[branchKey].goals;
                    goalSelect.innerHTML = `<option value="">-- ${translations[currentLang]?.filter_goal || 'Career Goal'} --</option>`;
                    for (const goalKey in goals) {
                        const goalData = goals[goalKey];
                        if (goalData && goalData.name) {
                            const option = document.createElement('option');
                            option.value = goalKey;
                            option.textContent = goalData.name[currentLang] || goalData.name.en;
                            goalSelect.appendChild(option);
                        }
                    }
                    goalSelect.disabled = false;
                } else {
                    goalSelect.innerHTML = `<option value="">-- ${translations[currentLang]?.filter_goal || 'Career Goal'} --</option>`;
                    goalSelect.disabled = true;
                }
            }

            function renderRoadmap(branchKey, goalKey) {
                roadmapContainer.innerHTML = '';
                const searchTerm = searchInput.value.toLowerCase().trim();

                if (!branchKey) {
                    messageContainer.classList.remove('hidden');
                    updateMessage('no_roadmap_title', 'no_roadmap_desc');
                    return;
                }
                if (!goalKey) {
                    messageContainer.classList.remove('hidden');
                    updateMessage('select_goal_title', 'select_goal_desc');
                    return;
                }

                const roadmap = roadmapData[branchKey]?.goals[goalKey]?.roadmap;
                if (!roadmap) {
                    messageContainer.classList.remove('hidden');
                    updateMessage('no_roadmap_title', 'no_roadmap_desc');
                    return;
                }

                let visibleTasks = 0;
                let completedVisibleTasks = 0;
                let hasVisibleContent = false;

                const roadmapHtml = roadmap.map((phase, phaseIndex) => {
                    const phaseId = `${branchKey}-${goalKey}-${phaseIndex}`;
                    
                    const contentHtml = phase.content.map((item, itemIndex) => {
                        const langText = item.text[currentLang] || item.text.en;
                        const itemTextForSearch = (typeof langText === 'object' && langText !== null) ? langText.title : langText;
                        
                        if (searchTerm && (!itemTextForSearch || !itemTextForSearch.toLowerCase().includes(searchTerm))) {
                            return '';
                        }

                        hasVisibleContent = true;
                        visibleTasks++;
                        const itemId = `${phaseId}-${itemIndex}`;
                        const isChecked = progress[itemId] || false;
                        if (isChecked) completedVisibleTasks++;

                        const icon = getIconForItemType(item.type);
                        let textHtml;
                        let geminiButtonHtml = '';

                        if (item.type === 'resource' && typeof langText === 'object' && langText !== null) {
                            textHtml = `<a href="${langText.url}" target="_blank" rel="noopener noreferrer" class="resource-link">${langText.title}</a>`;
                            geminiButtonHtml = `<button class="gemini-btn" data-gemini-type="resource" data-prompt-text="${langText.title}">✨ Find More</button>`;
                        } else {
                            textHtml = showdownConverter.makeHtml(itemTextForSearch || '');
                            if (item.type === 'project') {
                                geminiButtonHtml = `<button class="gemini-btn" data-gemini-type="project" data-prompt-text="${itemTextForSearch}">✨ Generate Ideas</button>`;
                            }
                        }

                        return `
                            <li class="flex items-start space-x-3 py-2">
                                <input type="checkbox" id="${itemId}" data-item-id="${itemId}" class="form-checkbox h-5 w-5 rounded text-blue-500 mt-1 focus:ring-blue-500" ${isChecked ? 'checked' : ''}>
                                <label for="${itemId}" class="flex-1 text-slate-700 dark:text-slate-300 ${isChecked ? 'line-through text-slate-500' : ''}">
                                    <span class="mr-2">${icon}</span>
                                    <span>${textHtml}</span>
                                    ${geminiButtonHtml}
                                </label>
                            </li>
                        `;
                    }).join('');

                    if (!contentHtml) return '';

                    return `
                        <div class="card rounded-xl shadow-lg overflow-hidden transition-all duration-300">
                            <button data-collapsible-trigger="${phaseId}" class="w-full text-left p-4 flex justify-between items-center bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700">
                                <h3 class="text-xl font-semibold text-blue-600 dark:text-blue-400">${phase.title[currentLang] || phase.title.en}</h3>
                                <svg class="w-6 h-6 transform transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </button>
                            <div id="${phaseId}" data-collapsible-content class="p-5" style="max-height: 5000px;">
                                <ul class="divide-y divide-slate-200 dark:divide-slate-700">
                                    ${contentHtml}
                                </ul>
                            </div>
                        </div>
                    `;
                }).join('');

                if (!hasVisibleContent && searchTerm) {
                    messageContainer.classList.remove('hidden');
                    updateMessage('no_results_title', 'no_results_desc');
                } else {
                    messageContainer.classList.add('hidden');
                }
                
                const progressBarHtml = `
                    <div class="mb-6 card p-4 rounded-xl shadow-md">
                        <h4 class="font-semibold mb-2" data-lang-key="progress">${translations[currentLang]?.progress || 'Progress'}</h4>
                        <div class="w-full progress-bar-bg rounded-full h-4 dark:bg-slate-700">
                            <div id="progress-bar" class="progress-bar-fill h-4 rounded-full transition-all duration-500" style="width: ${visibleTasks > 0 ? (completedVisibleTasks / visibleTasks) * 100 : 0}%"></div>
                        </div>
                        <p class="text-right text-sm mt-1 text-slate-500">${completedVisibleTasks} / ${visibleTasks}</p>
                    </div>
                `;

                roadmapContainer.innerHTML = (visibleTasks > 0 ? progressBarHtml : '') + roadmapHtml;
            }
            
            function handleCollapsibleClick(e) {
                const trigger = e.target.closest('[data-collapsible-trigger]');
                if (trigger) {
                    const content = document.getElementById(trigger.dataset.collapsibleTrigger);
                    const icon = trigger.querySelector('svg');
                    if (content.style.maxHeight && content.style.maxHeight !== '0px') {
                        content.style.maxHeight = '0px';
                        icon.style.transform = 'rotate(-90deg)';
                    } else {
                        content.style.maxHeight = content.scrollHeight + 'px';
                        icon.style.transform = 'rotate(0deg)';
                    }
                }
            }

            async function handleGeminiClick(e) {
                const button = e.target.closest('[data-gemini-type]');
                if (!button) return;

                const type = button.dataset.geminiType;
                const promptText = button.dataset.promptText;
                let prompt = '';

                if (type === 'project') {
                    aiModalTitle.textContent = "✨ AI Project Ideas";
                    prompt = `Based on the project goal "${promptText}", generate 3 creative and specific project ideas suitable for a B.Tech student's resume. For each idea, provide a brief description (2-3 sentences) and list the key technologies that would be used. Format the output as clean HTML using Tailwind CSS classes for styling (e.g., <div class="mb-4">, <h4 class="font-bold">, <p>, <strong>). Do not include <html> or <body> tags.`;
                } else if (type === 'resource') {
                    aiModalTitle.textContent = "✨ AI Resource Finder";
                    prompt = `Find 3 high-quality alternative online resources to "${promptText}". The resources should be suitable for a B.Tech student. For each resource, provide its name, a direct URL, and a one-sentence description of why it's a good alternative. Format the output as a simple HTML unordered list (<ul>) with each item containing a link (<a>) and a description. Use Tailwind CSS classes for styling. Do not include <html> or <body> tags.`;
                }

                if (!prompt) return;

                openAiModal(true);

                try {
                    let chatHistory = [{ role: "user", parts: [{ text: prompt }] }];
                    const payload = { contents: chatHistory };
                    const apiKey = ""; 
                    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
                    
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        throw new Error(`API request failed with status ${response.status}`);
                    }

                    const result = await response.json();

                    if (result.candidates && result.candidates.length > 0 &&
                        result.candidates[0].content && result.candidates[0].content.parts &&
                        result.candidates[0].content.parts.length > 0) {
                        const generatedText = result.candidates[0].content.parts[0].text;
                        aiModalContent.innerHTML = showdownConverter.makeHtml(generatedText);
                    } else {
                        throw new Error("Invalid response structure from API.");
                    }
                } catch (error) {
                    console.error("Gemini API Error:", error);
                    aiModalContent.innerHTML = `<p class="text-red-500">Sorry, something went wrong while fetching AI suggestions. Please try again later.</p><p class="text-sm text-slate-400 mt-2">${error.message}</p>`;
                } finally {
                    openAiModal(false);
                }
            }

            function openAiModal(isLoading = false) {
                aiModalOverlay.classList.remove('hidden');
                if (isLoading) {
                    aiModalContent.innerHTML = '<div class="flex justify-center items-center p-8"><div class="loader"></div></div>';
                }
            }

            function closeAiModal() {
                aiModalOverlay.classList.add('hidden');
                aiModalContent.innerHTML = '';
            }
            
            function getIconForItemType(type) {
                const icons = { subject: '📚', skill: '💻', resource: '🔗', project: '🚀', goal: '🎯' };
                return `<span title="${translations[currentLang]?.[type+'s'] || type}" class="text-lg">${icons[type] || '🔹'}</span>`;
            }

            function updateUI() {
                updateLanguageUI();
                updateGoalDropdown(currentBranch);
                branchSelect.value = currentBranch;
                goalSelect.value = currentGoal;
                renderRoadmap(currentBranch, currentGoal);
            }
            
            function updateMessage(titleKey, descKey) {
                const titleEl = messageContainer.querySelector('h3');
                const descEl = messageContainer.querySelector('p');
                titleEl.textContent = translations[currentLang]?.[titleKey] || '';
                titleEl.dataset.langKey = titleKey;
                descEl.textContent = translations[currentLang]?.[descKey] || '';
                descEl.dataset.langKey = descKey;
            }

            function handleFilterChange(e) {
                const isBranchChange = e.target.id === 'branch-select';
                currentBranch = branchSelect.value;
                
                if (isBranchChange) {
                    goalSelect.value = '';
                    updateGoalDropdown(currentBranch);
                }
                currentGoal = goalSelect.value;
                
                saveCurrentRoadmap();
                renderRoadmap(currentBranch, currentGoal);
            }

            function handleProgressChange(e) {
                if (e.target.matches('input[type="checkbox"]')) {
                    const itemId = e.target.dataset.itemId;
                    progress[itemId] = e.target.checked;
                    saveProgress();
                    renderRoadmap(currentBranch, currentGoal);
                }
            }

            function saveProgress() { localStorage.setItem('roadmapProgress', JSON.stringify(progress)); }
            function loadProgress() {
                const saved = localStorage.getItem('roadmapProgress');
                if (saved) progress = JSON.parse(saved);
            }
            function saveCurrentRoadmap() { localStorage.setItem('savedRoadmap', JSON.stringify({ branch: currentBranch, goal: currentGoal })); }
            function loadSavedRoadmap() {
                const saved = localStorage.getItem('savedRoadmap');
                if (saved) {
                    const { branch, goal } = JSON.parse(saved);
                    currentBranch = branch;
                    currentGoal = goal;
                }
            }

            function toggleDarkMode() {
                document.documentElement.classList.toggle('dark');
                const isDark = document.documentElement.classList.contains('dark');
                localStorage.setItem('darkMode', isDark);
                updateDarkModeIcons(isDark);
            }
            function loadDarkMode() {
                const isDark = localStorage.getItem('darkMode') === 'true';
                if (isDark) document.documentElement.classList.add('dark');
                updateDarkModeIcons(isDark);
            }
            function updateDarkModeIcons(isDark) {
                sunIcon.classList.toggle('hidden', isDark);
                moonIcon.classList.toggle('hidden', !isDark);
            }

            function setLanguage(lang) {
                currentLang = lang;
                localStorage.setItem('language', lang);
                updateUI();
                displayRandomQuote();
            }
            function loadLanguage() {
                currentLang = localStorage.getItem('language') || 'en';
            }
            function updateLanguageUI() {
                document.querySelectorAll('[data-lang-key]').forEach(el => {
                    const key = el.dataset.langKey;
                    if (translations[currentLang] && translations[currentLang][key]) {
                        el.textContent = translations[currentLang][key];
                    }
                });
                langButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.lang === currentLang));
                populateDropdowns();
                branchSelect.value = currentBranch;
                updateGoalDropdown(currentBranch);
                goalSelect.value = currentGoal;
                searchInput.placeholder = translations[currentLang]?.search_label ? `${translations[currentLang].search_label}...` : 'Search...';
            }
            
            function displayRandomQuote() {
                const langQuotes = quotes[currentLang];
                if (langQuotes && langQuotes.length > 0) {
                    const randomIndex = Math.floor(Math.random() * langQuotes.length);
                    quoteContainer.textContent = langQuotes[randomIndex];
                }
            }
            
            init();
        });
    </script>
</body>
